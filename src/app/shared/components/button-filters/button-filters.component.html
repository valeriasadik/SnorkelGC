<div class="filters-wrapper">
  <!-- Zone filter buttons (hidden in map mode) -->
  @if (viewMode() === 'list') {
    <div class="filter-buttons">
      <ion-button
        size="small"
        [fill]="selectedFilter() === 'All' ? 'solid' : 'outline'"
        (click)="onFilterClick('All')"
      >
        <ion-label>{{ ts.t().filters.all }}</ion-label>
      </ion-button>
      <ion-button
        size="small"
        [fill]="selectedFilter() === 'North' ? 'solid' : 'outline'"
        (click)="onFilterClick('North')"
      >
        <ion-label>{{ ts.t().filters.north }}</ion-label>
      </ion-button>
      <ion-button
        size="small"
        [fill]="selectedFilter() === 'South' ? 'solid' : 'outline'"
        (click)="onFilterClick('South')"
      >
        <ion-label>{{ ts.t().filters.south }}</ion-label>
      </ion-button>
    </div>
  }

  <!-- List / map toggle -->
  <ion-button
    class="toggle-view-btn"
    size="small"
    fill="outline"
    (click)="toggleViewMode()"
  >
    <ion-icon
      [name]="viewMode() === 'list' ? 'map' : 'list'"
      slot="icon-only"
    ></ion-icon>
  </ion-button>
</div>
