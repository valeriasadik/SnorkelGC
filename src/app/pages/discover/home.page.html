<ion-content [fullscreen]="true">
  <div class="page-header">
    <div class="header-row">
      <div class="header-text">
        <h1>{{ ts.t().discover.title }}</h1>
        <p>{{ ts.t().discover.subtitle }}</p>
      </div>
      <app-lang-toggle></app-lang-toggle>
    </div>
  </div>

  <app-button-filters
    [selectedFilter]="selectedFilter"
    [viewMode]="viewMode()"
    (filterChange)="applyFilter($event)"
    (viewModeChange)="onViewModeChange($event)"
  ></app-button-filters>

  @if (viewMode() === 'list') {
    <div class="section-header">
      <h2>{{ ts.t().discover.featuredSection }}</h2>
    </div>

    <div class="spots-container">
      @for (spot of spots(); track spot.id) {
        <app-spot-card
          [spot]="spot"
          [isFavorite]="isFavorite(spot.id)"
          (cardClick)="onSpotClick(spot.id)"
          (favoriteClick)="onFavoriteClick(spot.id)"
        ></app-spot-card>
      } @empty {
        <div class="empty-state">
          <ion-icon name="fish-outline" color="medium"></ion-icon>
          <p>{{ ts.t().discover.noSpots }}</p>
        </div>
      }
    </div>
  } @else {
    <app-map-spots
      [spots]="spots()"
      (spotClick)="onSpotClick($event)"
    ></app-map-spots>
  }
</ion-content>

<app-footer-nav
  [viewMode]="viewMode()"
  [showFavoritesOnly]="showFavoritesOnly()"
  (viewModeChange)="onViewModeChange($event)"
  (showFavoritesOnlyChange)="onFavoritesToggle($event)"
></app-footer-nav>
