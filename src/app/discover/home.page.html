<ion-content [fullscreen]="true">
  <div class="page-header">
    <h1>Descubrir Spots</h1>
    <p>Gran Canaria • Live Conditions</p>
  </div>

  <app-button-filters
    [selectedFilter]="selectedFilter"
    [viewMode]="viewMode()"
    (filterChange)="applyFilter($event)"
    (viewModeChange)="onViewModeChange($event)"
  ></app-button-filters>

  @if (viewMode() === 'list') {
    <div class="section-header">
      <h2>Spots Destacados</h2>
    </div>

    <div class="spots-container">
      @for (spot of spots(); track spot.id) {
      <app-spot-card
        [spot]="spot"
        [isFavorite]="isFavorite(spot.id)"
        (cardClick)="onSpotClick(spot.id)"
        (favoriteClick)="onFavoriteClick(spot.id)"
      >
      </app-spot-card>
      } @empty {
      <div class="empty-state">
        <ion-icon name="fish-outline" color="medium"></ion-icon>
        <p>No se encontraron spots</p>
      </div>
      }
    </div>
  } @else {
    <app-map-spots
      [spots]="spots()"
      (spotClick)="onSpotClick($event)"
    ></app-map-spots>
  }
</ion-content>

<app-footer-nav
  [viewMode]="viewMode()"
  (viewModeChange)="onViewModeChange($event)"
></app-footer-nav>
